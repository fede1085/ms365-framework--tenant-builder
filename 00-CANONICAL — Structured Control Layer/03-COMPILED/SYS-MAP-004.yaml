# source: SYS-MAP-004 — Authority Map
# layer: CAN
# authority_level: 1
id: "@SYS-MAP-004"
title: "Authority Map"
purpose: "Defines document authority levels to help AI agents prioritize source-of-truth documents."
authority_levels:
  - level: 1
    name: "Architecture Authority — Absolute Truth"
    description: "Documents that define unchangeable rules for the framework."
    overrides: [2, 3, 4]
    documents:
      - id: "@ARC-SYS-000"
        name: "Master System Rules"
      - id: "@ARC-STD-007"
        name: "Master Naming Authority"
      - id: "@ARC-STD-014"
        name: "Master Security Posture"
  - level: 2
    name: "Governance Documents — Policy Truth"
    description: "Documents that dictate the 'why' behind the architecture."
    overrides: [3, 4]
    documents:
      - id: "@ARC-GOV-016"
        name: "Identity Lifecycle Policy"
      - id: "@BLP-TMP-015"
        name: "Licensing and Cost Control Policy"
  - level: 3
    name: "Blueprint Authority — Structural Truth"
    description: "Documents that define the shape of instances, but not the specific data."
    overrides: [4]
    documents:
      - id: "@BLP-SYS-000"
        name: "Master Blueprint Control"
      - id: "@BLP-TMP-002"
        name: "Canonical Department Structure"
  - level: 4
    name: "Matrix Authority — Instance Data Truth"
    description: "Source of truth for a specific deployment or project."
    overrides: []
    documents:
      - id: "@MTX-USR-001"
        name: "Definitive list of Users for deployment"
      - id: "@MTX-GRP-001"
        name: "Definitive list of Groups for deployment"
ai_resolution_hierarchy:
  - order: 1
    layer: "ARC"
    rule: "ARC overrides BLP"
  - order: 2
    layer: "BLP"
    rule: "BLP overrides MTX"
  - order: 3
    layer: "MTX"
    rule: "MTX is the only valid source for AUT"
