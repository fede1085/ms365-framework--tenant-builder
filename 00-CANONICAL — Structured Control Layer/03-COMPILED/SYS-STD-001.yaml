id: "@SYS-STD-001"
title: "Canonical Vocabulary"
terms:
  - term: "Account"
    definition: "Refers strictly to the Entra ID object (User)."
  - term: "Architecture"
    layer: "ARC"
    definition: "The foundational rule-set."
  - term: "Blueprint"
    layer: "BLP"
    definition: "Standardized, reusable templates."
  - term: "Group"
    definition: "Specifically an Entra ID Security Group or Microsoft 365 Group."
  - term: "Instance"
    definition: "A specific, deployed project or tenant setup."
  - term: "Matrix"
    layer: "MTX"
    definition: "Data tables containing specific tenant values."
  - term: "Member"
    definition: "A user object that belongs to a Group."
  - term: "Owner"
    definition: "A user object that has administrative control over a Group or Mailbox."
  - term: "Permissions"
    definition: "Technical access rights (e.g., Read, Write, FullAccess, SendAs)."
  - term: "Role"
    definition: "A business function that dictates permissions."
  - term: "Shared Mailbox"
    definition: "An Exchange Online object without a standalone login."
  - term: "Tenant"
    definition: "The specific Microsoft 365 organization boundary."
  - term: "Template"
    definition: "A reusable pattern (Blueprint or Metadata)."
