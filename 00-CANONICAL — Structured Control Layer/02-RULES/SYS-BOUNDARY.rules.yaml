id: "rule:sys-boundary:v1"
type: "BoundaryRules"
rules:
  - rule_id: "BND-001"
    name: "Architecture Purity"
    layer: "ARC"
    constraint: "Must not contain client data or matrix data."
    enforcement: "Block parsing if instance data found."
  - rule_id: "BND-002"
    name: "Blueprint Purity"
    layer: "BLP"
    constraint: "Must act as agnostic structure. Must not define rules."
    enforcement: "Block parsing if governance rules defined."
  - rule_id: "BND-003"
    name: "Matrix Limitation"
    layer: "MTX"
    constraint: "Must contain data only. Must not contain logic or rules."
    enforcement: "Block parsing if non-data logic found."
  - rule_id: "BND-004"
    name: "Automation Source"
    layer: "AUT"
    constraint: "Must consume only MTX layer for variables."
    enforcement: "Block execution if variables sourced directly from BLP or ARC."
  - rule_id: "BND-005"
    name: "Semantic Naming"
    constraint: "All files must adhere to PREFIX-CATEGORY-### standard."
    enforcement: "Reject files without compliant prefix."
