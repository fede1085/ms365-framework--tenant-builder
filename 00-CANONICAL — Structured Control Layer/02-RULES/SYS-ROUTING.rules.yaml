# role: Machine-readable routing behavior rules related to CAN-RTE-001 and SYS-CONTEXT.router.yaml.
# note: This file defines routing behavior constraints and does not replace router tables.
id: "rule:sys-routing:v1"
type: "RoutingRules"
rules:
  - rule_id: "RTE-001"
    name: "Mandatory Context Initialization"
    action: "Always load SYS-GOV-001, SYS-GOV-002, SYS-MAP-000 before answering queries."
  - rule_id: "RTE-002"
    name: "Vocabulary Normalization"
    action: "Always route non-canonical terms through SYS-STD-001."
  - rule_id: "RTE-003"
    name: "Task Payload Context"
    action: "Load only abstractions relevant to the prompt layer. Drop unrelated abstractions."
  - rule_id: "RTE-004"
    name: "Cross-Layer Contamination Prevention"
    action: "Do not load AUT files when modifying ARC or BLP logic."
