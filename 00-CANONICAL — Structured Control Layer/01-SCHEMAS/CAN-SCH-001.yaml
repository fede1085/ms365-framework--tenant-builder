# role: Narrow/core metadata schema projection for required framework identity fields.
# note: This schema remains separate from SYS-META.schema.yaml pending future consolidation.
$schema: "http://json-schema.org/draft-07/schema#"
$id: "schema:can-sch-001:v1"
title: "Semantic Metadata Schema"
description: "Validation schema for framework metadata"
type: "object"
properties:
  id:
    type: "string"
    pattern: "^@[A-Z]{3}-[A-Z]{3}-[0-9]{3}$"
  domain:
    type: "string"
    enum: ["Identity", "Collaboration", "Messaging", "Devices", "Security", "Framework Ontology", "Operations"]
  layer:
    type: "string"
    enum: ["SYS", "ARC", "BLP", "MTX", "AUT", "CAN"]
  type:
    type: "string"
    enum: ["Index", "Rule", "Template", "Matrix", "Script", "Schema", "Graph", "Router", "Map", "Standard", "Governance"]
  status:
    type: "string"
    enum: ["Draft", "Active", "Deprecated"]
  authority_level:
    type: "integer"
    enum: [1, 2, 3, 4]
required:
  - "id"
  - "layer"
  - "type"
  - "authority_level"
